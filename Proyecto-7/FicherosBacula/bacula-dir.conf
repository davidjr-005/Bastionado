#
# Default Bacula Director Configuration file
# Configurado para cliente Linux y cliente Windows
# Schedule: Lunes Full, Miércoles Diferencial, resto Incremental
#
# Copyright (C) 2000-2022 Kern Sibbald
# License: BSD 2-Clause; see file LICENSE-FOSS
#

Director {
  Name = ubuntu-dir
  DIRport = 9101
  QueryFile = "/etc/bacula/scripts/query.sql"
  WorkingDirectory = "/var/lib/bacula"
  PidDirectory = "/run/bacula"
  Maximum Concurrent Jobs = 20
  Password = "fJqFOoWWz75SXp1OlS6RruTRPwB3qKIZz"
  Messages = Daemon
  DirAddress = 0.0.0.0
  TLS Enable = no
  TLS Require = no
}

# -------------------------------------------------------
# JOBDEFS
# -------------------------------------------------------

JobDefs {
  Name = "DefaultJob"
  Type = Backup
  Level = Incremental
  Client = debian1
  FileSet = "Linux Set"
  Schedule = "WeeklyCycle"
  Storage = File1
  Messages = Standard
  Pool = File
  SpoolAttributes = yes
  Priority = 10
  Write Bootstrap = "/var/lib/bacula/%c.bsr"
}

# -------------------------------------------------------
# JOBS
# -------------------------------------------------------

# Backup cliente Linux
Job {
  Name = "BackupClientLinux"
  JobDefs = "DefaultJob"
  Client = debian1
  FileSet = "Linux Set"
}

# Backup cliente Windows
Job {
  Name = "BackupClientWindows"
  JobDefs = "DefaultJob"
  Client = windows-client-fd
  FileSet = "Windows Set"
}

# Backup del catálogo (siempre necesario)
Job {
  Name = "BackupCatalog"
  JobDefs = "DefaultJob"
  Level = Full
  FileSet = "Catalog"
  Schedule = "WeeklyCycleAfterBackup"
  RunBeforeJob = "/etc/bacula/scripts/make_catalog_backup.pl MyCatalog"
  RunAfterJob  = "/etc/bacula/scripts/delete_catalog_backup"
  Write Bootstrap = "/var/lib/bacula/%n.bsr"
  Priority = 11
}

# Restore genérico
Job {
  Name = "RestoreFiles"
  Type = Restore
  Client = debian1
  Storage = File1
  FileSet = "Linux Set"
  Pool = File
  Messages = Standard
  Where = /tmp/bacula-restores
}

# -------------------------------------------------------
# FILESETS
# -------------------------------------------------------

# FileSet para el cliente Linux
FileSet {
  Name = "Linux Set"
  Include {
    Options {
      signature = MD5
      compression = GZIP
    }
    File = /home
    File = /etc
    File = /var
  }
  Exclude {
    File = /var/lib/bacula
    File = /proc
    File = /tmp
    File = /sys
    File = /.journal
    File = /.fsck
  }
}

# FileSet para el cliente Windows
FileSet {
  Name = "Windows Set"
  Include {
    Options {
      signature = MD5
      compression = GZIP
      IgnoreCase = yes
    }
    File = "C:/Users"
    File = "C:/Program Files"
  }
  Exclude {
    File = "C:/Windows/Temp"
    File = "C:/Temp"
    File = "C:/$Recycle.Bin"
  }
}

# FileSet del catálogo de Bacula
FileSet {
  Name = "Catalog"
  Include {
    Options {
      signature = MD5
    }
    File = "/var/lib/bacula/bacula.sql"
  }
}

# -------------------------------------------------------
# SCHEDULE
# Lunes     -> Full
# Martes    -> Incremental
# Miércoles -> Differential
# Jueves    -> Incremental
# Viernes   -> Incremental
# Sábado    -> Incremental
# Domingo   -> Incremental
# -------------------------------------------------------

Schedule {
  Name = "WeeklyCycle"
  Run = Full mon at 23:05
  Run = Incremental tue at 23:05
  Run = Differential wed at 23:05
  Run = Incremental thu at 23:05
  Run = Incremental fri at 23:05
  Run = Incremental sat at 23:05
  Run = Incremental sun at 23:05
}

Schedule {
  Name = "WeeklyCycleAfterBackup"
  Run = Full sun-sat at 23:10
}

